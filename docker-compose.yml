services:
  dolphin-bot:
    build:
      context: ./dolphin-bot/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
      - BITUNIX_API_KEY=${BITUNIX_API_KEY}
      - BITUNIX_SECRET_KEY=${BITUNIX_SECRET_KEY}
      - DEFAULT_SYMBOL=${DEFAULT_SYMBOL:-BTCUSDT}
      - DRY_RUN=${DRY_RUN:-true}
    volumes:
      - dolphin-data:/app/data
    networks:
      - tradehub-network

  dolphin-frontend:
    build:
      context: ./dolphin-bot/frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - dolphin-bot
    networks:
      - tradehub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dolphin-frontend.rule=Host(`delfin.thesolution.at`)"
      - "traefik.http.routers.dolphin-frontend.entrypoints=websecure"
      - "traefik.http.routers.dolphin-frontend.tls=true"
      - "traefik.http.routers.dolphin-frontend.middlewares=dolphin-auth"
      - "traefik.http.middlewares.dolphin-auth.basicauth.users=owner:$apr1$y.Usukd9$mCpYYvB1OBHCfULMnn0/f."
      - "traefik.http.services.dolphin-frontend.loadbalancer.server.port=3000"

volumes:
  dolphin-data:

networks:
  tradehub-network:
    external: true
