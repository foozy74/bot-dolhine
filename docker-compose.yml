services:
  dolphin-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dolphin-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "coolify.service=mainservice"
      - "traefik.enable=true"
      - "traefik.http.routers.dolphin-bot.rule=Host(`bot.thesolution.at`)"
      - "traefik.http.routers.dolphin-bot.entrypoints=websecure"
      - "traefik.http.routers.dolphin-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.dolphin-bot.loadbalancer.server.port=8000"

volumes:
  bot-data:
    driver: local