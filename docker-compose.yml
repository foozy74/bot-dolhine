services:
  # ─── Backend ──────────────────────────────────────
  dolphin-bot:
    build: ./dolphin-bot/backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
      - BITUNIX_API_KEY=${BITUNIX_API_KEY}
      - BITUNIX_SECRET_KEY=${BITUNIX_SECRET_KEY}
      - DEFAULT_SYMBOL=${DEFAULT_SYMBOL:-BTCUSDT}
      - DRY_RUN=${DRY_RUN:-true}
    volumes:
      - dolphin-data:/app/data
    networks:
      - tradehub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────
  dolphin-frontend:
    build: ./dolphin-bot/frontend
    restart: unless-stopped
    depends_on:
      - dolphin-bot
    networks:
      - tradehub-network

  # ─── Nginx (Reverse Proxy) ────────────────────────
  dolphin-nginx:
    build: ./dolphin-bot/nginx
    restart: unless-stopped
    depends_on:
      - dolphin-bot
      - dolphin-frontend
    networks:
      - tradehub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dolphin-router.rule=Host(`dolphin.thesolution.at`)"
      - "traefik.http.routers.dolphin-router.tls=true"
      - "traefik.http.services.dolphin-router.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dolphin-data:

networks:
  tradehub-network:
    external: true
