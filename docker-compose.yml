services:
  dolphin-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dolphin-bot
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "coolify.service=mainservice"

volumes:
  bot-data:
    driver: local