services:
  dolphin-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
      - BITUNIX_API_KEY=${BITUNIX_API_KEY}
      - BITUNIX_SECRET_KEY=${BITUNIX_SECRET_KEY}
      - DEFAULT_SYMBOL=${DEFAULT_SYMBOL:-BTCUSDT}
      - DRY_RUN=${DRY_RUN:-true}
    volumes:
      - dolphin-data:/app/data
    networks:
      - tradehub-network

  dolphin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - dolphin-bot
    networks:
      - tradehub-network

volumes:
  dolphin-data:

networks:
  tradehub-network:
    external: true
    name: tradehub-shared