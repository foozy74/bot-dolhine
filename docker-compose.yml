services:
  # ─── Backend ──────────────────────────────────────
  dolphin-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dolphin-bot
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
    volumes:
      - bot-data:/app/data
    networks:
      - dolphin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dolphin-frontend
    restart: unless-stopped
    depends_on:
      - dolphin-bot
    networks:
      - dolphin-network

  # ─── Nginx (Reverse Proxy) ────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: dolphin-nginx
    restart: unless-stopped
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS}
    depends_on:
      - dolphin-bot
      - frontend
    networks:
      - dolphin-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.service=mainservice"
      # Traefik labels for Coolify routing
      - "traefik.enable=true"
      - "traefik.http.routers.dolphin-bot.rule=Host(`bot.thesolution.at`)"
      - "traefik.http.routers.dolphin-bot.entrypoints=websecure"
      - "traefik.http.routers.dolphin-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.dolphin-bot.loadbalancer.server.port=80"

volumes:
  bot-data:
    driver: local

networks:
  dolphin-network:
    driver: bridge