# Multi-Service Docker Compose Deployment
# Coolify erkennt Docker Compose anhand dieser Datei

version: "3.8"

services:
  # ─── Backend ──────────────────────────────────────
  dolphin-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/dolphin.db
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - dolphin-bot

  # ─── Nginx (Reverse Proxy) ────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-admin}
    command: >
      sh -c "
        apk add --no-cache apache2-utils &&
        htpasswd -b -c /etc/nginx/.htpasswd $${BASIC_AUTH_USER} $${BASIC_AUTH_PASS} &&
        nginx -g 'daemon off;'
      "
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dolphin-bot
      - frontend

volumes:
  bot-data:
    driver: local
