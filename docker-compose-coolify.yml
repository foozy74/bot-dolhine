# Docker Compose für Coolify
# Nutze diese Datei wenn du "Docker Compose" als Application Type wählst

services:
  dolphin-bot:
    image: ghcr.io/thesolution/dolphin-bot/backend:main
    container_name: dolphin-bot
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/dolphin.db
      - BITUNIX_API_KEY=${BITUNIX_API_KEY}
      - BITUNIX_SECRET_KEY=${BITUNIX_SECRET_KEY}
      - DEFAULT_SYMBOL=${DEFAULT_SYMBOL:-BTCUSDT}
      - DRY_RUN=${DRY_RUN:-true}
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/thesolution/dolphin-bot/frontend:main
    container_name: dolphin-frontend
    restart: unless-stopped
    depends_on:
      - dolphin-bot

  nginx:
    image: ghcr.io/thesolution/dolphin-bot/nginx:main
    container_name: dolphin-nginx
    restart: unless-stopped
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-admin}
    depends_on:
      - dolphin-bot
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dolphin-bot.rule=Host(`bot.thesolution.at`)"
      - "traefik.http.routers.dolphin-bot.entrypoints=websecure"
      - "traefik.http.routers.dolphin-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.dolphin-bot.loadbalancer.server.port=80"

volumes:
  bot-data:
    driver: local